<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/resources/favicon.ico" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script>window.__PUBLIC_PATH = "/";</script>
  <base href="/">
  <style>
      :root {
          --primary: #6366f1;
          --dark: #1e293b;
          --light: #f8fafc;
      }

      body {
          font-family: 'Comic Sans MS';
          background-color: var(--dark);
          color: var(--light);
          margin: 0;
          display: flex;
          align-items: center;
          justify-content: center;
          height: 100vh;
          text-align: center;
      }

      .container {
          padding: 2rem;
          max-width: 600px;
      }

      .logo {
          font-size: 3rem;
          font-weight: 800;
          background: linear-gradient(to right, #818cf8, #c084fc);
          -webkit-background-clip: text;
          -webkit-text-fill-color: transparent;
          margin-bottom: 1rem;
      }

      h1 {
          font-size: 1.5rem;
          font-weight: 300;
          letter-spacing: 2px;
          text-transform: uppercase;
          margin-bottom: 2rem;
          opacity: 0.8;
      }

      .card {
          background: rgba(255, 255, 255, 0.05);
          padding: 2rem;
          border-radius: 1rem;
          border: 1px solid rgba(255, 255, 255, 0.1);
          backdrop-filter: blur(10px);
      }

      p {
          line-height: 1.6;
          color: #cbd5e1;
          margin-bottom: 2rem;
      }

      .btn {
          background-color: var(--primary);
          color: white;
          padding: 0.75rem 1.5rem;
          text-decoration: none;
          border-radius: 0.5rem;
          font-weight: 600;
          transition: transform 0.2s, background 0.2s;
          display: inline-block;
      }

      .btn:hover {
          background-color: #4f46e5;
          transform: translateY(-2px);
      }

      footer {
          margin-top: 3rem;
          font-size: 0.8rem;
          color: #64748b;
      }
  </style>

  <script type="module" crossorigin src="/internal/index.C43hVVKS.js"></script>
  <link rel="stylesheet" crossorigin href="/internal/index.qDVLvyK2.css">
</head>
<body>
<div class="container">
  <div class="logo">NOVA</div>
  <!--    xmlui markdown -->
  <div data-xmlui-src="./bio"></div>
  <h1>Something Great is Brewing</h1>

  <div class="card">
    <p>We're currently working hard behind the scenes to bring you a brand new digital experience. Stick around, it's
      going to be worth the wait.</p>
    <!--    checkout form in xmlui-->
    <div data-xmlui-src="./checkout-form"></div>
    <a href="mailto:hello@example.com" class="btn">Get Notified</a>
  </div>

  <footer>
    &copy; 2026 Project Nova. All rights reserved.
  </footer>
</div>

</body>
</html>
