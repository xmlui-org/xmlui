name: Carry Support Fixes to Main

concurrency:
  group: carry-support-to-main
  cancel-in-progress: true

on:
  workflow_dispatch:
  pull_request:
    types:
      - closed
    branches:
      - support

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  test-main-merge:
    name: Fast test main with support merged
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true
    timeout-minutes: 30
    runs-on: ubuntu-latest-16-core
    env:
      TURBO_UI: "false"
      NODE_OPTIONS: "--max-old-space-size=8192"
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Merge support into main worktree
        run: |
          git fetch origin support
          git merge --no-edit FETCH_HEAD
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"
      - name: Install node dependencies
        run: npm ci --prefer-offline
      - name: Cache for Turbo
        uses: rharkor/caching-for-turbo@v2.3.1
      - name: Store Playwright's Version
        run: |
          PLAYWRIGHT_VERSION=$(npm ls @playwright/test | grep @playwright | sed 's/.*@//' | sort | head -n 1)
          echo "Playwright's Version: $PLAYWRIGHT_VERSION"
          echo "PLAYWRIGHT_VERSION=$PLAYWRIGHT_VERSION" >> $GITHUB_ENV
      - name: Cache Playwright Browsers for Playwright's Version
        id: cache-playwright-browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-browsers-${{ env.PLAYWRIGHT_VERSION }}
      - name: Install Playwright Browsers
        if: steps.cache-playwright-browsers.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps
      - name: Ensure we can build xmlui and the extensions
        run: npm run build-xmlui
      - name: Run fast test suite on main merge result
        run: npm run test
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-main-with-support
          path: xmlui/playwright-report/
          retention-days: 30

  open-main-pr:
    name: Open support to main PR
    needs: test-main-merge
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create or update carry-forward PR
        env:
          GH_TOKEN: ${{ secrets.SUPPORT_SYNC_TOKEN || secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          existing_pr="$(gh pr list \
            --repo "$REPO" \
            --base main \
            --head support \
            --state open \
            --json number \
            --jq '.[0].number // ""')"

          title="Carry support fixes forward to main"
          body="This PR carries fixes that have landed on \`support\` forward into \`main\`.

          PRs into \`support\` are expected to pass the full test suite before merge.
          This workflow tested the same changes against the \`main\` merge result before opening or refreshing this PR."

          if [ -n "$existing_pr" ]; then
            gh pr comment "$existing_pr" \
              --repo "$REPO" \
              --body "Support was updated and the full test suite passed. This PR is ready for the latest carry-forward check."
          else
            gh pr create \
              --repo "$REPO" \
              --base main \
              --head support \
              --title "$title" \
              --body "$body"
          fi
