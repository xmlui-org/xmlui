name: Prepare versions for release

on:
  workflow_dispatch:
    inputs:
      branch:
        description: Branch to create version PR for
        required: true
        default: main
        type: choice
        options:
          - main
          - support

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  create_version_pr:
    name: Create Stable Version PR
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - name: Install Dependencies
        run: npm ci --prefer-offline

      - name: Enforce patch-only changesets (support)
        if: inputs.branch == 'support'
        shell: bash
        run: |
          shopt -s nullglob
          fail=false
          for f in .changeset/*.md; do
            if grep -qE '^"[^"]+": (minor|major)$' "$f"; then
              >&2 echo "FAIL: $f — only patch releases are allowed from support."
              fail=true
            fi
          done
          $fail && exit 1 || echo "All changesets are patch-level."

      - name: Create Version PR
        id: changesets_pr
        uses: changesets/action@v1
        with:
          version: npm run changeset:version
          commit: "chore: version packages for ${{ inputs.branch == 'support' && 'patch' || 'stable' }} release"
          title: "Version Packages for ${{ inputs.branch == 'support' && 'Patch' || 'Stable' }} Release"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Output Changeset PR URL
        if: steps.changesets_pr.outputs.pullRequestUrl
        run: |
          echo "Version PR created: ${{ steps.changesets_pr.outputs.pullRequestUrl }}"
