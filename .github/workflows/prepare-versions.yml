name: Prepare versions for release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "npm dist-tag for the release. 'support' is only for patch releases for older minor versions. 'latest' sets the default target for npm."
        required: true
        default: latest
        type: choice
        options:
          - latest
          - support

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  prepare:
    name: Prepare ${{ inputs.tag }} release from ${{ github.ref_name }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - name: Enforce patch-only changesets on support branches
        if: startsWith(github.ref_name, 'support/')
        shell: bash
        run: |
          shopt -s nullglob
          fail=false
          echo "Checking for non-patch changesets on support branch"
          for f in .changeset/*.md; do
            if grep -qE '^"[^"]+": (minor|major)$' "$f"; then
              >&2 echo "FAIL: $f — only patch releases are allowed from support branches."
              fail=true
            fi
          done
          $fail && exit 1 || echo "All changesets are patch-level."

      - name: Install Dependencies
        run: npm ci --prefer-offline

      - name: Create Version PR
        id: changesets_pr
        uses: changesets/action@v1
        with:
          version: npm run changeset:version
          commit: "chore: version packages for [${{ inputs.tag }}] release"
          title: "Version Packages for [${{ inputs.tag }}] release"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Output Changeset PR URL
        if: steps.changesets_pr.outputs.pullRequestUrl
        run: |
          echo "Version PR created: ${{ steps.changesets_pr.outputs.pullRequestUrl }}"
