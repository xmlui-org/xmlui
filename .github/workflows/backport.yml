name: Backport to support

on:
  pull_request_target:
    types: [closed]
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  backport:
    runs-on: ubuntu-latest
    if: >
      github.event.pull_request.merged == true &&
      contains(github.event.pull_request.labels.*.name, 'backport')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: korthout/backport-action@v3
        with:
          target_branches: support
          pull_title: '[backport] ${pull_title}'
          pull_description: 'Backport of #${pull_number} to `support`.'
